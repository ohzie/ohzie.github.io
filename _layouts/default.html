<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <div class="site-avatars">
            <a href="https://evewho.com/corporation/98755828" target="_blank" class="site-avatar"><img src="https://images.evetech.net/corporations/98755828/logo?size=128" alt="A Leap Of Faith" /></a>
            <a href="https://evewho.com/alliance/1900696668" target="_blank" class="site-avatar site-avatar-alliance"><img src="https://images.evetech.net/alliances/1900696668/logo?size=128" alt="The Initiative." /></a>
          </div>

          <div class="site-info">
            <h1 class="site-name"><a href="https://evewho.com/corporation/98755828" target="_blank">{{ site.name }}</a></h1>
          </div>

          <nav>
            <span class="recruit-status">Recruitment: <span class="recruit-status-value">Selective</span></span>
            <a href="https://zkillboard.com/corporation/98755828/" target="_blank">zKill</a>
            <a href="https://evewho.com/corporation/98755828" target="_blank">EveWho</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
